<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Auto Panchang Ticker</title>
<style>
body{margin:0;background:transparent;font-family:Arial,sans-serif}
.ticker{
  width:100%;background:#000;color:#fff;font-size:46px;font-weight:900;
  padding:8px 15px;border-bottom:4px solid red;text-align:center;
  box-sizing:border-box;white-space:nowrap
}
.yellow{color:#ffd400}
</style>
</head>
<body>

<div class="ticker" id="panchangText">पंचांग लोड हो रहा है...</div>

<script>
const API_KEY = "VZAYVkj16r5U6G9PPDREG6oPbkTNRxaH2SDuLSZZ";

const LATITUDE = 23.1765;
const LONGITUDE = 75.7885;
const TIMEZONE = 5.5;

const CALL_INTERVAL = 60 * 60 * 1000;
const MAX_CALLS_PER_DAY = 24;

const hindiDays = ["रविवार","सोमवार","मंगलवार","बुधवार","गुरुवार","शुक्रवार","शनिवार"];
const hindiMonths = ["जनवरी","फरवरी","मार्च","अप्रैल","मई","जून","जुलाई","अगस्त","सितंबर","अक्टूबर","नवंबर","दिसंबर"];

function todayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function formatHindiDate(){
  const d = new Date();
  return `${d.getDate()} ${hindiMonths[d.getMonth()]}, ${d.getFullYear()}`;
}

function getHindiDay(){
  return hindiDays[new Date().getDay()];
}

function show(msg){
  document.getElementById("panchangText").innerHTML = msg;
}

function canCallApi(){
  const count = Number(localStorage.getItem("panchang_count_"+todayKey()) || 0);
  const last = Number(localStorage.getItem("panchang_last_"+todayKey()) || 0);
  const now = Date.now();

  if(count >= MAX_CALLS_PER_DAY) return false;
  if(last && now - last < CALL_INTERVAL) return false;

  return true;
}

function saveApiCall(){
  const key = "panchang_count_" + todayKey();
  const count = Number(localStorage.getItem(key) || 0);
  localStorage.setItem(key, count + 1);
  localStorage.setItem("panchang_last_" + todayKey(), Date.now());
}

async function loadPanchang(){
  const saved = localStorage.getItem("panchang_saved_" + todayKey());
  if(saved) show(saved);

  if(!canCallApi() && saved) return;

  try{
    const d = new Date();

    const response = await fetch("https://json.freeastrologyapi.com/tithi", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": API_KEY
      },
      body: JSON.stringify({
        day: d.getDate(),
        month: d.getMonth() + 1,
        year: d.getFullYear(),
        hour: 12,
        min: 0,
        lat: LATITUDE,
        lon: LONGITUDE,
        tzone: TIMEZONE
      })
    });

    const text = await response.text();

    if(!response.ok){
      show(`${formatHindiDate()} <span class="yellow">${getHindiDay()}</span> API Error ${response.status}`);
      console.log("API ERROR TEXT:", text);
      return;
    }

    const data = JSON.parse(text);
    console.log("API DATA:", data);

    const tithi = data?.tithi_details?.tithi_name || "";
    const paksha = data?.tithi_details?.paksha || "";

    if(!tithi || !paksha){
      show(`${formatHindiDate()} <span class="yellow">${getHindiDay()}</span> Data path error`);
      return;
    }

    const finalText = `${formatHindiDate()} <span class="yellow">${getHindiDay()}</span> ${paksha} पक्ष ${tithi} तिथि`;

    saveApiCall();
    localStorage.setItem("panchang_saved_" + todayKey(), finalText);
    show(finalText);

  }catch(error){
    show(`${formatHindiDate()} <span class="yellow">${getHindiDay()}</span> Fetch/CORS Error`);
    console.log(error);
  }
}

loadPanchang();
setInterval(loadPanchang, 60 * 1000);
</script>

</body>
</html>
