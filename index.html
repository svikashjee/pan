<script>
const API_KEY = "YOUR_API_KEY_HERE";

const lat = 23.1765;
const lon = 75.7885;
const tzone = 5.5;

const hindiDays = [
  "रविवार","सोमवार","मंगलवार","बुधवार",
  "गुरुवार","शुक्रवार","शनिवार"
];

const hindiMonths = [
  "जनवरी","फरवरी","मार्च","अप्रैल","मई","जून",
  "जुलाई","अगस्त","सितंबर","अक्टूबर","नवंबर","दिसंबर"
];

function formatDate() {
  const d = new Date();
  return `${d.getDate()} ${hindiMonths[d.getMonth()]}, ${d.getFullYear()}`;
}

function getDay() {
  return hindiDays[new Date().getDay()];
}

function todayKey(){
  const d=new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

// API CALL CONTROL
const CALL_INTERVAL = 30 * 60 * 1000;
const MAX_CALLS = 48;

function canCall(){
  const count = Number(localStorage.getItem("callCount_"+todayKey())||0);
  const last = Number(localStorage.getItem("lastCall_"+todayKey())||0);
  const now = Date.now();

  if(count>=MAX_CALLS) return false;
  if(last && now-last<CALL_INTERVAL) return false;

  return true;
}

function saveCall(){
  const key="callCount_"+todayKey();
  const count = Number(localStorage.getItem(key)||0);
  localStorage.setItem(key,count+1);
  localStorage.setItem("lastCall_"+todayKey(),Date.now());
}

function showSaved(){
  const saved = localStorage.getItem("panchang_"+todayKey());
  if(saved){
    document.getElementById("panchangText").innerHTML = saved;
  }
}

async function loadPanchang(){

  showSaved();

  if(!canCall()) return;

  try{

    saveCall();

    const d = new Date();

    const res = await fetch("https://json.freeastrologyapi.com/tithi",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":API_KEY
      },
      body:JSON.stringify({
        day:d.getDate(),
        month:d.getMonth()+1,
        year:d.getFullYear(),
        hour:12,
        min:0,
        lat:lat,
        lon:lon,
        tzone:tzone
      })
    });

    const data = await res.json();

    console.log(data);

    const tithi = data?.tithi_details?.tithi_name || "त्रयोदशी";
    const paksha = data?.tithi_details?.paksha || "शुक्ल";

    const finalText =
      `${formatDate()} <span style="color:#ffd400">${getDay()}</span> ${paksha} पक्ष ${tithi} तिथि`;

    localStorage.setItem("panchang_"+todayKey(),finalText);

    document.getElementById("panchangText").innerHTML = finalText;

  }catch(e){
    console.log("API ERROR",e);
  }
}

loadPanchang();
setInterval(loadPanchang,60000);
</script>
